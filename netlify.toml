[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' /.netlify/functions/"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[functions]]
  directory = "netlify/functions"
